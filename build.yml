name: Build Windows App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ github.workspace }}\video-shuffler-app\video-shuffler
        run: npm install

      - name: Build Windows exe
        working-directory: ${{ github.workspace }}\video-shuffler-app\video-shuffler
        run: npm run build-win

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Video-Shuffler-Windows
          path: video-shuffler-app/video-shuffler/dist/*.exe
          retention-days: 30
        
